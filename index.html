<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KadrGram | Чат</title>
    <style>
        body { background: #e6ebee; display: flex; height: 100vh; font-family: sans-serif; margin: 0; }
        .sidebar { width: 300px; background: white; border-right: 1px solid #ccc; display: flex; flex-direction: column; }
        .chat { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; background: #c5d1d6; }
        .msg { background: white; padding: 8px 15px; border-radius: 15px; max-width: 70%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; font-size: 15px; line-height: 1.4; }
        .my { align-self: flex-end; background: #effdde; border-bottom-right-radius: 2px; }
        .msg-time { font-size: 10px; color: #888; margin-left: 8px; float: right; margin-top: 5px; }
        .delete-btn { display: none; position: absolute; top: -8px; right: -8px; background: #ff5c5c; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 12px; line-height: 18px; text-align: center; cursor: pointer; border: 1px solid white; font-weight: bold; }
        .msg:hover .delete-btn { display: block; }
        .unread-badge { background: #3390ec; color: white; border-radius: 12px; padding: 2px 8px; font-size: 11px; float: right; font-weight: bold; margin-top: 2px; }
        .input-area { background: white; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #ddd; outline: none; }
        button { background: #3390ec; color: white; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="background:#3390ec; color:white; padding:15px; font-weight:bold;">KadrGram <a href="/logout" style="color:white; float:right; font-size:12px;">Выйти</a></div>
        <div style="padding: 10px; text-align: center;"><a href="/search" style="text-decoration: none; color: #3390ec; font-size: 14px;">🔍 Найти людей</a></div>
        <div id="user-list-sidebar">
            {% for u in all_users %}
                <a href="/?chat_with={{ u.id }}" class="user-link" style="display:block; padding:15px; text-decoration:none; color:black; border-bottom:1px solid #eee">
                    {{ u.name }}
                    <span class="unread-badge" id="badge-{{ u.id }}">{% if u.unread > 0 %}{{ u.unread }}{% endif %}</span>
                </a>
            {% endfor %}
        </div>
    </div>

    <div class="chat">
        {% if target_user %}
            <div style="background:white; padding:15px; font-weight:bold; border-bottom:1px solid #ddd;">{{ target_user.name }}</div>
            <div class="messages" id="mlist"></div>
            <div class="input-area">
                <input id="txt" placeholder="Написать..." autocomplete="off">
                <button onclick="send()">Отправить</button>
            </div>
        {% else %}
            <div style="margin: auto; color: #888;">Выберите, кому написать</div>
        {% endif %}
    </div>

    <script>
        const rid = new URLSearchParams(window.location.search).get('chat_with');
        const mlist = document.getElementById('mlist');
        let totalMsgsOld = 0;
        let isPageActive = true;

        document.addEventListener('visibilitychange', () => {
            isPageActive = !document.hidden;
            if (isPageActive) document.title = "KadrGram | Чат";
        });

        function updateSidebar() {
            fetch('/get_contacts')
                .then(res => res.json())
                .then(data => {
                    data.users.forEach(u => {
                        const badge = document.getElementById(`badge-${u.id}`);
                        if (badge) {
                            badge.innerText = u.unread > 0 ? u.unread : '';
                        }
                    });
                });
        }

        function markAsRead() {
            if (!rid || !isPageActive) return;
            fetch('/mark_read', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_with: rid })
            }).then(() => {
                const badge = document.getElementById(`badge-${rid}`);
                if (badge) badge.innerText = '';
            });
        }

        function load() {
            if (!rid) return;
            fetch(`/get_messages?chat_with=${rid}`)
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    data.messages.forEach(m => {
                        const isMy = m.sender === data.my_id;
                        const side = isMy ? 'my' : '';
                        const delBtn = isMy ? `<span class="delete-btn" onclick="deleteMsg(${m.id})">×</span>` : '';
                        html += `<div class="msg ${side}">${delBtn}${m.text}<span class="msg-time">${m.display_time || ''}</span></div>`;
                    });
                    mlist.innerHTML = html;
                    markAsRead();
                });
        }

        function checkGlobal() {
            fetch('/check_all_notifications')
                .then(res => res.json())
                .then(data => {
                    if (totalMsgsOld === 0) { totalMsgsOld = data.total; return; }
                    if (data.total > totalMsgsOld && !isPageActive) {
                        const diff = data.total - totalMsgsOld;
                        document.title = `(${diff}) Новое сообщение!`;
                    }
                    if (isPageActive) totalMsgsOld = data.total;
                });
        }

        function send() {
            const t = document.getElementById('txt');
            if (t.value.trim() && rid) {
                fetch('/send_simple', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: t.value, receiver_id: rid })
                }).then(() => { t.value = ''; load(); updateSidebar(); });
            }
        }

        function deleteMsg(msgId) {
            if (!confirm("Удалить сообщение?")) return;
            fetch('/delete_message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ msg_id: msgId })
            }).then(res => { if (res.ok) load(); });
        }

        if (rid) { setInterval(load, 2000); load(); }
        setInterval(checkGlobal, 3000);
        setInterval(updateSidebar, 4000); // Обновляем кружочки раз в 4 сек
        document.addEventListener('keypress', (e) => { if(e.key === 'Enter') send(); });
    </script>
</body>
</html>

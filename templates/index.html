<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KadrGram</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; }
        .sidebar { width: 300px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: white; }
        .search-box { padding: 10px; background: #f0f2f5; }
        .search-box input { width: 100%; padding: 8px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .user-item:hover { background: #f0f2f5; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 8px 12px; border-radius: 8px; margin-bottom: 8px; max-width: 75%; box-shadow: 0 1px 1px rgba(0,0,0,0.1); word-wrap: break-word; }
        .my-msg { align-self: flex-end; background: #dcf8c6; }
        .input-area { padding: 15px; background: white; display: flex; gap: 10px; align-items: center; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        .unread-badge { background: #25d366; color: white; border-radius: 12px; padding: 2px 8px; font-size: 11px; font-weight: bold; }
        button { background: none; border: none; color: #0084ff; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="search-box">
            <input type="text" id="userSearch" placeholder="Поиск..." onkeyup="filterUsers()">
        </div>
        <div class="user-list" id="contacts">
            {% for u in all_users %}
            <div class="user-item" id="user-{{ u.id }}" onclick="location.href='/?chat_with={{ u.id }}'">
                <span>{{ u.name }}</span>
                <span class="unread-badge" id="badge-{{ u.id }}" {% if u.unread == 0 %}style="display:none;"{% endif %}>
                    {{ u.unread if u.unread > 0 else '' }}
                </span>
            </div>
            {% endfor %}
        </div>
        <div style="padding: 15px; border-top: 1px solid #eee; font-size: 14px;">
            <b>{{ user.name }}</b> | <a href="/logout" style="color: #d9534f; text-decoration: none;">Выйти</a>
        </div>
    </div>

    <div class="chat-area">
        {% if target_user %}
            <div style="padding: 15px; background: white; border-bottom: 1px solid #ddd; font-weight: bold;">{{ target_user.name }}</div>
            <div class="messages" id="msgBox"></div>
            <div class="input-area">
                <input type="text" id="textInp" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()">➤</button>
            </div>
        {% else %}
            <div style="display:flex; justify-content:center; align-items:center; height:100%; color: #888;">Выберите, кому написать</div>
        {% endif %}
    </div>

    <script>
        const targetId = "{{ target_user.id if target_user else '' }}";

        function filterUsers() {
            let val = document.getElementById('userSearch').value.toLowerCase();
            document.querySelectorAll('.user-item').forEach(item => {
                let name = item.querySelector('span').innerText.toLowerCase();
                item.style.display = name.includes(val) ? 'flex' : 'none';
            });
        }

        async function updateBadges() {
            try {
                let res = await fetch('/get_contacts');
                let contacts = await res.json();
                contacts.forEach(c => {
                    let badge = document.getElementById(`badge-${c.id}`);
                    if (badge) {
                        badge.innerText = c.unread > 0 ? c.unread : '';
                        badge.style.display = c.unread > 0 ? 'inline-block' : 'none';
                    }
                });
            } catch (e) { console.error(e); }
        }

        async function loadMsgs() {
            if (!targetId) return;
            try {
                let res = await fetch(`/get_messages?chat_with=${targetId}`);
                let data = await res.json();
                let html = '';
                data.messages.forEach(m => {
                    let cls = m.sender === data.my_id ? 'msg my-msg' : 'msg';
                    
                    // КОНВЕРТАЦИЯ ВРЕМЕНИ
                    let displayTime = "";
                    if (m.utc_time) {
                        let date = new Date(m.utc_time);
                        displayTime = date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    }

                    html += `<div class="${cls}">${m.text}<div style="font-size:10px; color:gray; text-align:right; margin-top:4px;">${displayTime}</div></div>`;
                });
                
                let msgBox = document.getElementById('msgBox');
                let isBottom = msgBox.scrollHeight - msgBox.clientHeight <= msgBox.scrollTop + 60;
                msgBox.innerHTML = html;
                if (isBottom) msgBox.scrollTop = msgBox.scrollHeight;
            } catch (e) { console.error(e); }
        }

        async function sendMsg() {
            let inp = document.getElementById('textInp');
            if (!inp.value.trim()) return;
            let val = inp.value;
            inp.value = '';
            await fetch('/send_simple', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ receiver_id: targetId, text: val })
            });
            loadMsgs();
        }

        setInterval(updateBadges, 3000);
        if (targetId) {
            setInterval(loadMsgs, 3000);
            loadMsgs();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KadrGram</title>
    <style>
        body { display: flex; height: 100dvh; margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; overflow: hidden; }
        .sidebar { width: 350px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: white; z-index: 2; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; position: relative; }
        @media (max-width: 768px) {
            .sidebar { width: 100%; position: absolute; height: 100%; display: {{ 'none' if target_user else 'flex' }}; }
            .chat-area { width: 100%; display: {{ 'flex' if target_user else 'none' }}; }
            .back-btn { display: block !important; }
        }
        .back-btn { display: none; text-decoration: none; color: #0088cc; font-size: 24px; margin-right: 15px; }
        .online-dot { width: 10px; height: 10px; background: #25d366; border-radius: 50%; display: inline-block; margin-left: 5px; border: 2px solid white; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .user-item:hover { background: #f5f5f5; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 10px 14px; border-radius: 15px; margin-bottom: 10px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; word-wrap: break-word; }
        .my-msg { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        .input-area { padding: 10px 15px; background: white; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 16px; }
        .send-btn { background: none; border: none; color: #0088cc; font-size: 28px; cursor: pointer; }
        .unread-badge { background: #25d366; color: white; border-radius: 12px; padding: 2px 8px; font-size: 12px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding: 20px; background: white; border-bottom: 1px solid #eee;">
            <h2 style="margin:0; color:#0088cc;">KadrGram</h2>
        </div>
        <div class="user-list">
            {% for u in all_users %}
            <div class="user-item" id="user-{{ u.id }}" onclick="location.href='/?chat_with={{ u.id }}'">
                <div style="display:flex; align-items:center;">
                    <span style="font-weight: 500;">{{ u.name }}</span>
                    <span class="status-dot-container">{% if u.online %}<span class="online-dot"></span>{% endif %}</span>
                </div>
                <span class="unread-badge" id="badge-{{ u.id }}" {% if u.unread == 0 %}style="display:none;"{% endif %}>{{ u.unread }}</span>
            </div>
            {% endfor %}
        </div>
        <div style="padding: 15px; border-top: 1px solid #eee; background: #f9f9f9; display: flex; justify-content: space-between; align-items: center;">
            <b style="font-size: 14px;">{{ user.name }}</b>
            <a href="/logout" style="color:#d9534f; text-decoration:none; font-size: 14px; font-weight: bold;">Выход</a>
        </div>
    </div>

    <div class="chat-area">
        {% if target_user %}
            <div style="padding: 10px 15px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center;">
                <a href="/" class="back-btn">←</a>
                <div>
                    <div style="font-weight: bold; font-size: 16px;">{{ target_user.name }}</div>
                    <div id="chatStatus" style="font-size: 12px; color: {{ '#25d366' if target_user.online else '#888' }};">
                        {{ 'в сети' if target_user.online else 'был недавно' }}
                    </div>
                </div>
            </div>
            <div class="messages" id="msgBox"></div>
            <div class="input-area">
                <input type="text" id="textInp" placeholder="Напишите сообщение..." autocomplete="off">
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        {% else %}
            <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100%; color: #888;">
                <div style="font-size: 50px;">💬</div>
                <div>Выберите чат, чтобы начать общение</div>
            </div>
        {% endif %}
    </div>

    <!-- КРИТИЧНО: Подключаем библиотеку ДО основного кода -->
    <script src="https://cloudflare.com"></script>

    <script>
        // 1. Инициализация переменных (Строго в начале!)
        const socket = io(); 
        const targetId = "{{ target_user.id if target_user else '' }}";
        const myId = "{{ user._id|string }}";

        // 2. Вход в персональную комнату
        socket.emit('join');

        // 3. Загрузка истории сообщений при открытии чата
        if (targetId) {
            fetch(`/get_messages?with=${targetId}`)
                .then(r => r.json())
                .then(msgs => {
                    msgs.forEach(m => drawMessage(m));
                    scrollToBottom();
                });
        }

        // 4. Получение нового сообщения в реальном времени
        socket.on('receive_message', (msg) => {
            if ((msg.sender === targetId && msg.receiver === myId) || (msg.sender === myId && msg.receiver === targetId)) {
                drawMessage(msg);
                scrollToBottom();
            } else {
                updateBadge(msg.sender);
            }
        });

        // 5. Глобальное обновление статусов (онлайн/оффлайн)
        socket.on('user_status', (data) => {
            const userEl = document.getElementById(`user-${data.user_id}`);
            if (userEl) {
                const dotContainer = userEl.querySelector('.status-dot-container');
                dotContainer.innerHTML = data.online ? '<span class="online-dot"></span>' : '';
            }
            if (data.user_id === targetId) {
                const statusText = document.getElementById('chatStatus');
                statusText.innerText = data.online ? "в сети" : "был недавно";
                statusText.style.color = data.online ? "#25d366" : "#888";
            }
        });

        // Функция отправки сообщения
        function sendMsg() {
            const inp = document.getElementById('textInp');
            const val = inp.value.trim();
            if (!val || !targetId) return;

            socket.emit('new_message', {
                receiver_id: targetId,
                text: val
            });
            inp.value = '';
        }

        // Отрисовка сообщения в окне
        function drawMessage(m) {
            const box = document.getElementById('msgBox');
            if(!box) return;
            const isMy = m.sender === myId;
            const time = new Date(m.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            const html = `
                <div class="msg ${isMy ? 'my-msg' : ''}">
                    ${m.text}
                    <div style="font-size:10px; color:gray; text-align:right; margin-top:4px;">${time}</div>
                </div>`;
            box.insertAdjacentHTML('beforeend', html);
        }

        function scrollToBottom() {
            const b = document.getElementById('msgBox');
            if(b) b.scrollTop = b.scrollHeight;
        }

        function updateBadge(sid) {
            const b = document.getElementById(`badge-${sid}`);
            if(b) {
                b.style.display = 'block';
                b.innerText = (parseInt(b.innerText) || 0) + 1;
            }
        }

        // Обработка нажатия Enter
        const inputField = document.getElementById('textInp');
        if (inputField) {
            inputField.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') sendMsg();
            });
        }
    </script>
</body>
</html>

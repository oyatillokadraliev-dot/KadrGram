<!DOCTYPE html>
<html>
<head>
  <title>KadrGram Chat</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
    }

    .chat-box {
      height: 400px;
      overflow-y: auto;
      padding: 10px;
      background: #1e293b;
      border-radius: 10px;
    }

    .msg {
      max-width: 60%;
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
    }

    .me {
      background: #3b82f6;
      margin-left: auto;
    }

    .other {
      background: #334155;
      margin-right: auto;
    }
  </style>
</head>

<body class="container mt-4">

<h4>Ты: {{ session["user"] }}</h4>

<div class="chat-box" id="chat"></div>

<div class="d-flex mt-2">
  <input id="msg" class="form-control me-2" placeholder="Написать сообщение...">
  <button onclick="sendMessage()" class="btn btn-primary">➤</button>
</div>

<script>
const socket = io();
const me = "{{ session['user'] }}";

// ⚠️ пока без выбора пользователя (упрощено)
const other = "test";  

socket.emit("join", {
  user1: me,
  user2: other
});

function sendMessage() {
  const text = document.getElementById("msg").value;

  socket.emit("send_message", {
    sender: me,
    receiver: other,
    text: text
  });

  document.getElementById("msg").value = "";
}

socket.on("receive_message", (data) => {
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.classList.add("msg");

  if (data.sender === me) {
    div.classList.add("me");
  } else {
    div.classList.add("other");
  }

  div.innerText = data.text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>

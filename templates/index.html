<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram 2.0 Chat</title>

<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
body{margin:0;display:flex;height:100dvh;background:#0f0f0f}

/* LEFT */
.sidebar{
width:320px;background:#17212b;color:#fff;display:flex;flex-direction:column
}
.user{
padding:14px;cursor:pointer;border-bottom:1px solid #222;
display:flex;justify-content:space-between
}
.user:hover{background:#202b36}
.active{background:#2b5278}

/* RIGHT */
.chat{
flex:1;display:flex;flex-direction:column;background:#0e1621
}

/* HEADER */
.header{
padding:12px;background:#17212b;color:#fff
}

/* MSGS */
.messages{
flex:1;overflow:auto;padding:15px;
display:flex;flex-direction:column;gap:8px
}

.msg{
max-width:70%;
padding:10px 12px;
border-radius:12px;
background:#182533;
color:#fff;
position:relative;
word-break:break-word
}

.me{align-self:flex-end;background:#2b5278}

/* reply */
.reply{
font-size:12px;
opacity:.7;
border-left:2px solid #4ea4ff;
padding-left:6px;
margin-bottom:5px
}

/* image */
.msg img{
max-width:100%;
border-radius:10px;
margin-top:5px
}

/* footer */
.footer{
display:flex;
justify-content:flex-end;
font-size:10px;
opacity:.6;
margin-top:5px;
gap:4px
}

/* input */
.input{
display:flex;
padding:10px;
background:#17212b;
gap:10px
}
.input input{
flex:1;padding:10px;border-radius:20px;border:none;outline:none
}

/* typing */
.typing{
font-size:12px;
color:#aaa;
padding:5px 15px
}

/* mobile */
@media(max-width:768px){
.sidebar{position:absolute;z-index:10;width:100%;height:100%}
.chat{width:100%}
.hidden{display:none}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="side">
{% for u in all_users %}
<div class="user" onclick="openChat('{{u.id}}')">
<span>{{u.name}}</span>
</div>
{% endfor %}
</div>

<!-- CHAT -->
<div class="chat">

<div class="header" id="title">Chat</div>

<div class="messages" id="box"></div>

<div class="typing" id="typing"></div>

<div class="input">
<input id="inp" placeholder="Сообщение...">
<button onclick="send()">➤</button>
</div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>

var socket=io();
var TARGET=null;
var ME="{{my_id}}";

var reply=null;
var edit=null;

/* OPEN CHAT */
function openChat(id){
TARGET=id;
document.getElementById("box").innerHTML="";
fetch("/get_messages?with="+id)
.then(r=>r.json())
.then(d=>d.forEach(draw));

document.getElementById("title").innerText="Chat "+id;

/* mobile */
document.getElementById("side").classList.add("hidden");
}

/* DRAW */
function draw(m){
let box=document.getElementById("box");

let d=document.createElement("div");
d.className="msg"+(m.sender==ME?" me":"");

/* reply */
if(m.reply_text){
let r=document.createElement("div");
r.className="reply";
r.innerText=m.reply_text;
d.appendChild(r);
}

/* image */
if(m.image){
let img=document.createElement("img");
img.src=m.image;
d.appendChild(img);
}

/* text */
if(m.text){
let t=document.createElement("div");
t.innerText=m.text;
d.appendChild(t);
}

/* footer */
let f=document.createElement("div");
f.className="footer";
f.innerText=(m.read?"✓✓":"✓");
d.appendChild(f);

box.appendChild(d);
box.scrollTop=box.scrollHeight;
}

/* SEND */
function send(){
let inp=document.getElementById("inp");
if(!inp.value) return;

socket.emit("new_message",{
receiver_id:TARGET,
text:inp.value,
reply_to:reply
});

inp.value="";
}

/* RECEIVE */
socket.on("receive_message",m=>{
if(m.sender==TARGET||m.receiver==TARGET) draw(m);
});

/* TYPING */
socket.on("typing",d=>{
document.getElementById("typing").innerText=
d.typing?"печатает...":"";
});

document.addEventListener("input",e=>{
if(e.target.id=="inp"){
socket.emit("typing",{receiver_id:TARGET,typing:true});
setTimeout(()=>socket.emit("typing",{receiver_id:TARGET,typing:false}),800);
}
});

/* LOAD */
if(TARGET){
fetch("/get_messages?with="+TARGET)
.then(r=>r.json())
.then(d=>d.forEach(draw));
}

</script>
</body>
</html>

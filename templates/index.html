<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>KadrGram</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: sans-serif; }
        .sidebar { width: 300px; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .search-box { padding: 10px; background: #f0f2f5; }
        .search-box input { width: 100%; padding: 8px; border-radius: 20px; border: 1px solid #ddd; box-sizing: border-box; }
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; }
        .user-item:hover { background: #f9f9f9; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; max-width: 70%; position: relative; word-wrap: break-word; }
        .my-msg { align-self: flex-end; background: #dcf8c6; }
        .input-area { padding: 20px; background: white; display: flex; }
        .input-area input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .unread-badge { background: #25d366; color: white; border-radius: 50%; padding: 2px 7px; font-size: 12px; height: fit-content; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="search-box">
            <input type="text" id="userSearch" placeholder="Поиск пользователей..." onkeyup="filterUsers()">
        </div>
        <div class="user-list" id="contacts">
            {% for u in all_users %}
            <!-- Добавили id="user-{{ u.id }}" чтобы JS мог найти этот элемент -->
            <div class="user-item" id="user-{{ u.id }}" onclick="location.href='/?chat_with={{ u.id }}'">
                <span>{{ u.name }}</span>
                <!-- Добавили id="badge-{{ u.id }}" для управления счетчиком -->
                <span class="unread-badge" id="badge-{{ u.id }}" {% if u.unread == 0 %}style="display:none;"{% endif %}>
                    {{ u.unread if u.unread > 0 else '' }}
                </span>
            </div>
            {% endfor %}
        </div>
        <div style="padding: 10px; border-top: 1px solid #ddd;">
            {{ user.name }} | <a href="/logout">Выйти</a>
        </div>
    </div>

    <div class="chat-area">
        {% if target_user %}
            <div style="padding: 15px; background: white; border-bottom: 1px solid #ddd;">Чат с <b>{{ target_user.name }}</b></div>
            <div class="messages" id="msgBox"></div>
            <div class="input-area">
                <input type="text" id="textInp" placeholder="Напишите сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button onclick="sendMsg()">Отправить</button>
            </div>
        {% else %}
            <div style="display:flex; justify-content:center; align-items:center; height:100%;">Выберите чат</div>
        {% endif %}
    </div>

    <script>
        const targetId = "{{ target_user.id if target_user else '' }}";

        function filterUsers() {
            let val = document.getElementById('userSearch').value.toLowerCase();
            let items = document.querySelectorAll('.user-item');
            items.forEach(item => {
                let name = item.querySelector('span').innerText.toLowerCase();
                item.style.display = name.includes(val) ? 'flex' : 'none';
            });
        }

        // 1. Функция обновления счетчиков в сайдбаре
        async function updateBadges() {
            let res = await fetch('/get_contacts'); // Создадим этот роут в app.py
            let contacts = await res.json();
            contacts.forEach(c => {
                let badge = document.getElementById(`badge-${c.id}`);
                if (badge) {
                    if (c.unread > 0) {
                        badge.innerText = c.unread;
                        badge.style.display = 'inline-block';
                    } else {
                        badge.innerText = '';
                        badge.style.display = 'none';
                    }
                }
            });
        }

        async function loadMsgs() {
            if (!targetId) return;
            let res = await fetch(`/get_messages?chat_with=${targetId}`);
            let data = await res.json();
            let html = '';
            data.messages.forEach(m => {
                let cls = m.sender === data.my_id ? 'msg my-msg' : 'msg';
                html += `<div class="${cls}">${m.text}<div style="font-size:10px; color:gray; text-align:right;">${m.display_time}</div></div>`;
            });
            
            // Сохраняем позицию скролла, если пользователь прокрутил вверх
            let msgBox = document.getElementById('msgBox');
            let isAtBottom = msgBox.scrollHeight - msgBox.clientHeight <= msgBox.scrollTop + 1;
            
            msgBox.innerHTML = html;

            // Если были внизу, прокручиваем к новым сообщениям
            if (isAtBottom) msgBox.scrollTop = msgBox.scrollHeight;
        }

        async function sendMsg() {
            let inp = document.getElementById('textInp');
            if (!inp.value.trim()) return;
            let text = inp.value;
            inp.value = ''; // Очищаем сразу для скорости
            
            await fetch('/send_simple', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    receiver_id: targetId,
                    text: text
                })
            });
            loadMsgs();
        }

        // Запускаем циклы обновления
        setInterval(updateBadges, 3000); // Обновляем сайдбар всегда

        if (targetId) {
            setInterval(loadMsgs, 3000); // Сообщения обновляем только в чате
            loadMsgs();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>KadrGram</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

  <style>
    body { background:#0f172a; color:white; }

    .sidebar {
      height: 100vh;
      background: #1e293b;
      padding: 10px;
    }

    .chat-box {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
      background: #0f172a;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 10px;
      max-width: 60%;
    }

    .me { background:#3b82f6; margin-left:auto; }
    .other { background:#334155; margin-right:auto; }

    .user {
      padding:10px;
      cursor:pointer;
    }

    .user:hover {
      background:#334155;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- USERS -->
    <div class="col-3 sidebar">
      <h5>Пользователи</h5>

      {% for u in users %}
        {% if u.username != session["user"] %}
          <div class="user" onclick="selectUser('{{u.username}}')">
            {{u.username}}
          </div>
        {% endif %}
      {% endfor %}
    </div>

    <!-- CHAT -->
    <div class="col-9">
      <h4 class="p-2">Ты: {{session["user"]}}</h4>

      <div id="chat" class="chat-box"></div>

      <div class="d-flex p-2">
        <input id="msg" class="form-control me-2">
        <button onclick="sendMessage()" class="btn btn-primary">Send</button>
      </div>
    </div>

  </div>
</div>

<script>
const socket = io();
const me = "{{session['user']}}";
let currentUser = null;

function selectUser(user) {
  currentUser = user;
  document.getElementById("chat").innerHTML = "";

  socket.emit("join", {
    user1: me,
    user2: user
  });
}

function sendMessage() {
  if (!currentUser) return alert("Выбери пользователя");

  const text = document.getElementById("msg").value;

  socket.emit("send_message", {
    sender: me,
    receiver: currentUser,
    text: text
  });

  document.getElementById("msg").value = "";
}

socket.on("receive_message", (data) => {
  if (!currentUser) return;

  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.classList.add("msg");

  if (data.sender === me) {
    div.classList.add("me");
  } else {
    div.classList.add("other");
  }

  div.innerText = data.text;

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
});
</script>

</body>
</html>

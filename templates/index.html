<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KadrGram</title>
    <style>
        body { display: flex; height: 100vh; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f0f2f5; overflow: hidden; }
        
        /* Боковая панель */
        .sidebar { 
            width: 350px; 
            border-right: 1px solid #ddd; 
            display: flex; 
            flex-direction: column; 
            background: white; 
            z-index: 2;
        }
        
        /* Область чата */
        .chat-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            background: #e5ddd5; 
            position: relative;
        }

        /* Адаптивность для мобильных устройств */
        @media (max-width: 768px) {
            .sidebar { 
                width: 100%; 
                position: absolute; 
                height: 100%;
                /* Если выбран чат, скрываем сайдбар на мобилке */
                display: {{ 'none' if target_user else 'flex' }}; 
            }
            .chat-area { 
                width: 100%;
                /* Если чат не выбран, скрываем пустую область на мобилке */
                display: {{ 'flex' if target_user else 'none' }}; 
            }
            .back-btn { display: block !important; }
        }

        /* Кнопка назад (только для мобилок) */
        .back-btn { 
            display: none; 
            text-decoration: none; 
            color: #0088cc; 
            font-size: 24px; 
            margin-right: 15px; 
            line-height: 1;
        }

        .search-box { padding: 10px; background: #f0f2f5; display: flex; align-items: center; gap: 10px; }
        .search-box input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; font-size: 16px; }
        
        .user-list { flex: 1; overflow-y: auto; }
        .user-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .user-item:hover { background: #f9f9f9; }
        
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 10px 14px; border-radius: 15px; margin-bottom: 10px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-wrap: break-word; font-size: 16px; }
        .my-msg { align-self: flex-end; background: #dcf8c6; border-bottom-right-radius: 2px; }
        
        .input-area { padding: 10px 15px; background: white; display: flex; align-items: center; gap: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        .input-area input { flex: 1; padding: 12px 18px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 16px; }
        .send-btn { background: none; border: none; color: #0088cc; font-size: 28px; cursor: pointer; padding: 0; }

        .unread-badge { background: #25d366; color: white; border-radius: 12px; padding: 2px 8px; font-size: 12px; font-weight: bold; }
        #clockWrapper { padding: 10px; text-align: center; background: #f9f9f9; border-bottom: 1px solid #ddd; }
        
        .global-search-icon { text-decoration: none; font-size: 20px; }
    </style>
</head>
<body>
    <!-- ЛЕВАЯ ПАНЕЛЬ (СПИСОК) -->
    <div class="sidebar">
        <div id="clockWrapper">
            <div id="digitalClock" style="font-size: 22px; font-weight: bold; color: #555;">00:00:00</div>
            <div id="onlineStatus" style="font-size: 10px; font-weight: bold; color: #25d366;">● В СЕТИ</div>
        </div>

        <div class="search-box">
            <input type="text" id="userSearch" placeholder="Поиск..." onkeyup="filterUsers()">
            <a href="/search" class="global-search-icon" title="Найти людей">🔍</a>
        </div>

        <div class="user-list" id="contacts">
            {% for u in all_users %}
            <div class="user-item" id="user-{{ u.id }}" onclick="location.href='/?chat_with={{ u.id }}'">
                <span style="font-weight: 500;">{{ u.name }}</span>
                <span class="unread-badge" id="badge-{{ u.id }}" {% if u.unread == 0 %}style="display:none;"{% endif %}>{{ u.unread }}</span>
            </div>
            {% endfor %}
        </div>

        <div style="padding: 15px; border-top: 1px solid #eee; background: #f9f9f9; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 14px;"><b>{{ user.name }}</b></span>
            <a href="/logout" style="color: #d9534f; text-decoration: none; font-size: 14px;">Выход</a>
        </div>
    </div>

    <!-- ПРАВАЯ ПАНЕЛЬ (ЧАТ) -->
    <div class="chat-area">
        {% if target_user %}
            <div style="padding: 12px 15px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05);">
                <a href="/" class="back-btn">←</a>
                <div style="font-weight: bold; font-size: 17px;">{{ target_user.name }}</div>
            </div>
            
            <div class="messages" id="msgBox"></div>
            
            <div class="input-area">
                <input type="text" id="textInp" placeholder="Сообщение..." autocomplete="off" onkeydown="if(event.key==='Enter') sendMsg()">
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        {% else %}
            <div style="display:flex; flex-direction: column; justify-content:center; align-items:center; height:100%; color: #888;">
                <div style="font-size: 50px; margin-bottom: 10px;">💬</div>
                <div>Выберите чат для начала общения</div>
            </div>
        {% endif %}
    </div>

    <script>
        const targetId = "{{ target_user.id if target_user else '' }}";

        // Часы и онлайн-статус
        function updateClock() {
            const now = new Date();
            document.getElementById('digitalClock').textContent = now.toLocaleTimeString();
            const status = document.getElementById('onlineStatus');
            if (navigator.onLine) {
                status.textContent = "● В СЕТИ"; status.style.color = "#25d366";
            } else {
                status.textContent = "● ОФФЛАЙН"; status.style.color = "#d9534f";
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Поиск по списку (фильтр)
        function filterUsers() {
            let val = document.getElementById('userSearch').value.toLowerCase();
            document.querySelectorAll('.user-item').forEach(item => {
                let name = item.querySelector('span').innerText.toLowerCase();
                item.style.display = name.includes(val) ? 'flex' : 'none';
            });
        }

        // Обновление баджей (счетчиков)
        async function updateBadges() {
            try {
                let res = await fetch('/get_contacts');
                let contacts = await res.json();
                contacts.forEach(c => {
                    let badge = document.getElementById(`badge-${c.id}`);
                    if (badge) {
                        badge.innerText = c.unread > 0 ? c.unread : '';
                        badge.style.display = c.unread > 0 ? 'inline-block' : 'none';
                    }
                });
            } catch (e) {}
        }

        // Загрузка сообщений
        async function loadMsgs() {
            if (!targetId) return;
            try {
                let res = await fetch(`/get_messages?chat_with=${targetId}`);
                let data = await res.json();
                let html = '';
                data.messages.forEach(m => {
                    let isMy = m.sender === data.my_id;
                    let cls = isMy ? 'msg my-msg' : 'msg';
                    let time = m.utc_time ? new Date(m.utc_time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                    let ticks = isMy ? (m.read ? '<span style="color:#34b7f1; font-size: 12px;"> ✔✔</span>' : '<span style="color:gray; font-size: 12px;"> ✔</span>') : "";

                    html += `<div class="${cls}">${m.text}<div style="font-size:10px; color:gray; text-align:right; margin-top:4px;">${time}${ticks}</div></div>`;
                });
                let msgBox = document.getElementById('msgBox');
                let isBottom = msgBox.scrollHeight - msgBox.clientHeight <= msgBox.scrollTop + 100;
                msgBox.innerHTML = html;
                if (isBottom) msgBox.scrollTop = msgBox.scrollHeight;
            } catch (e) {}
        }

        // Отправка
        async function sendMsg() {
            let inp = document.getElementById('textInp');
            if (!inp.value.trim()) return;
            let text = inp.value; 
            inp.value = '';
            await fetch('/send_simple', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ receiver_id: targetId, text: text })
            });
            loadMsgs();
        }

        setInterval(updateBadges, 3000);
        if (targetId) { 
            setInterval(loadMsgs, 3000); 
            loadMsgs(); 
        }
    </script>
</body>
</html>

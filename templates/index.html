<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KadrGram</title>
    <style>
        body { display: flex; height: 100dvh; margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; overflow: hidden; }
        .sidebar { width: 350px; border-right: 1px solid #ddd; display: flex; flex-direction: column; background: white; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #e5ddd5; position: relative; }
        .user-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .online-dot { width: 10px; height: 10px; background: #25d366; border-radius: 50%; display: inline-block; margin-left: 5px; }
        .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 8px 12px; border-radius: 12px; margin-bottom: 8px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .my-msg { align-self: flex-end; background: #dcf8c6; }
        .input-area { padding: 10px; background: white; display: flex; gap: 10px; border-top: 1px solid #ddd; }
        .input-area input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        .send-btn { background: none; border: none; color: #0088cc; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding: 20px; font-size: 20px; font-weight: bold; color: #0088cc;">KadrGram</div>
        <div style="flex: 1; overflow-y: auto;">
            {% for u in all_users %}
            <div class="user-item" onclick="location.href='/?chat_with={{ u.id }}'">
                <span>{{ u.name }} {% if u.online %}<span class="online-dot"></span>{% endif %}</span>
            </div>
            {% endfor %}
        </div>
        <div style="padding: 15px; background: #eee;"><b>{{ user.name }}</b> <a href="/logout" style="float:right; color:red;">Выход</a></div>
    </div>

    <div class="chat-area">
        {% if target_user %}
            <div style="padding: 15px; background: white; border-bottom: 1px solid #ddd; font-weight: bold;">{{ target_user.name }}</div>
            <div class="messages" id="msgBox"></div>
            <div class="input-area">
                <input type="text" id="textInp" placeholder="Напишите сообщение..." onkeydown="if(event.key==='Enter') sendMsg()">
                <button class="send-btn" onclick="sendMsg()">➤</button>
            </div>
        {% else %}
            <div style="display:flex; justify-content:center; align-items:center; height:100%; color: #888;">Выберите чат для начала общения</div>
        {% endif %}
    </div>

    <!-- ПОДКЛЮЧАЕМ SOCKET.IO -->
    <script src="https://cloudflare.com"></script>
    <script>
        const socket = io();
        const targetId = "{{ target_user.id if target_user else '' }}";
        const myId = "{{ user._id|string }}";

        socket.emit('join');

        if (targetId) {
            fetch(`/get_messages?with=${targetId}`)
                .then(r => r.json())
                .then(msgs => {
                    msgs.forEach(m => drawMessage(m));
                    scrollToBottom();
                });
        }

        socket.on('receive_message', (msg) => {
            if ((msg.sender === targetId && msg.receiver === myId) || (msg.sender === myId && msg.receiver === targetId)) {
                drawMessage(msg);
                scrollToBottom();
            }
        });

        function sendMsg() {
            const inp = document.getElementById('textInp');
            if (!inp.value.trim() || !targetId) return;
            socket.emit('new_message', { receiver_id: targetId, text: inp.value });
            inp.value = '';
        }

        function drawMessage(m) {
            const box = document.getElementById('msgBox');
            if(!box) return;
            const isMy = m.sender === myId;
            const html = `<div class="msg ${isMy?'my-msg':''}">${m.text}</div>`;
            box.insertAdjacentHTML('beforeend', html);
        }

        function scrollToBottom() {
            const b = document.getElementById('msgBox');
            if(b) b.scrollTop = b.scrollHeight;
        }
    </script>
</body>
</html>

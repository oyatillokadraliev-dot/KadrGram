<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KadrGram | Профиль</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            --primary: #3390ec;
            --danger: #ff6b6b;
            --bg: #f0f4f8;
            --white: #ffffff;
            --border: #e8ecf0;
            --text: #1a1a2e;
            --text2: #7a8a9a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 40px 20px 100px 20px;
        }

        /* ЦЕНТРАЛЬНЫЙ БЛОК ПРОФИЛЯ */
        .profile-container {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 30px 24px;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        .avatar-main {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(51, 144, 236, 0.2);
        }

        .profile-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-username {
            font-size: 14px;
            color: var(--text2);
            margin-bottom: 24px;
        }

        /* КНОПКИ НА СТРАНИЦЕ */
        .action-btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 12px;
            text-decoration: none;
            text-align: center;
        }

        .btn-blue {
            background: var(--primary);
            color: white !important;
        }

        .btn-blue:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .btn-red {
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger) !important;
            border: 1px solid rgba(255, 107, 107, 0.2);
            margin-top: 12px;
            margin-bottom: 0;
        }

        .btn-red:hover {
            background: rgba(255, 107, 107, 0.18);
            transform: scale(1.02);
        }

        /* МОДАЛЬНЫЕ ОКНА */
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 46, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 380px;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.15);
            animation: modalIn 0.2s ease-out;
            text-align: left;
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #f8fafc;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: var(--primary);
            background: white;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons .action-btn {
            margin-bottom: 0;
            padding: 12px;
        }

        .btn-cancel {
            background: #e2e8f0;
            color: #475569 !important;
        }

        /* НИЖНИЙ ТУЛБАР */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--white);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            text-decoration: none;
            color: var(--text2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 500;
            flex: 1;
        }

        .nav-item.active {
            color: var(--primary);
        }
    </style>
</head>
<body>

    <!-- КАРТОЧКА ПРОФИЛЯ -->
    <div class="profile-container">
        <div class="avatar-main">
            {% if user and user.name %}
                {{ user.name[0]|upper }}
            {% else %}
                K
            {% endif %}
        </div>
        <div class="profile-name">{{ user.name if user else 'kkk' }}</div>
        <div class="profile-username">@{{ user.login if user else 'Oyatullo' }}</div>

        <!-- Кнопки управления теперь имеют уникальный класс .action-btn -->
        <button type="button" class="action-btn btn-blue" onclick="openModal('nameModal')">Изменить имя</button>
        <button type="button" class="action-btn btn-blue" onclick="openModal('loginModal')">Изменить логин</button>
        <button type="button" class="action-btn btn-blue" onclick="openModal('passwordModal')">Сменить пароль</button>
        
        <a href="/logout" class="action-btn btn-red">Выйти</a>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО: ИЗМЕНИТЬ ИМЯ -->
    <div id="nameModal" class="modal" onclick="closeModalOnOutsideClick(event, 'nameModal')">
        <div class="modal-content">
            <div class="modal-title">Новое имя</div>
            <form action="/change_name" method="POST">
                <input type="text" name="name" class="form-input" placeholder="Введите имя" required autocomplete="off" value="{{ user.name if user else '' }}">
                <div class="modal-buttons">
                    <button type="button" class="action-btn btn-cancel" onclick="closeModal('nameModal')">Отмена</button>
                    <button type="submit" class="action-btn btn-blue">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО: ИЗМЕНИТЬ ЛОГИН -->
    <div id="loginModal" class="modal" onclick="closeModalOnOutsideClick(event, 'loginModal')">
        <div class="modal-content">
            <div class="modal-title">Новый логин</div>
            <form action="/change_login" method="POST">
                <input type="text" name="login" class="form-input" placeholder="Введите логин" required autocomplete="off" value="{{ user.login if user else '' }}">
                <div class="modal-buttons">
                    <button type="button" class="action-btn btn-cancel" onclick="closeModal('loginModal')">Отмена</button>
                    <button type="submit" class="action-btn btn-blue">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО: СМЕНИТЬ ПАРОЛЬ -->
    <div id="passwordModal" class="modal" onclick="closeModalOnOutsideClick(event, 'passwordModal')">
        <div class="modal-content">
            <div class="modal-title">Смена пароля</div>
            <form action="/change_password" method="POST">
                <input type="password" name="password" class="form-input" placeholder="Введите новый пароль" required minlength="8">
                <div class="modal-buttons">
                    <button type="button" class="action-btn btn-cancel" onclick="closeModal('passwordModal')">Отмена</button>
                    <button type="submit" class="action-btn btn-blue">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <!-- НИЖНИЙ ТУЛБАР -->
    <div class="bottom-nav">
        <a href="/" class="nav-item">
            <span>💬</span>
            <div>Чаты</div>
        </a>
        <a href="/search" class="nav-item">
            <span>🔍</span>
            <div>Поиск</div>
        </a>
        <a href="/profile" class="nav-item active">
            <span>👤</span>
            <div>Профиль</div>
        </a>
    </div>

    <script>
        function openModal(modalId) {
            document.getElementById(modalId).classList.add('active');
        }

        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }

        function closeModalOnOutsideClick(event, modalId) {
            if (event.target === document.getElementById(modalId)) {
                closeModal(modalId);
            }
        }
    </script>
</body>
</html>

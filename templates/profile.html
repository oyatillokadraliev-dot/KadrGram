<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>KadrGram | Профиль</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            --primary: #0088cc;
            --primary2: #0088cc;
            --success: #25d366;
            --danger: #ff6b6b;
            --bg: #f0f4f8;
            --white: #ffffff;
            --border: #e8ecf0;
            --text: #1a1a2e;
            --text2: #7a8a9a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;

            /* 🔥 FIX №1: убираем огромный отступ */
            padding: 40px 20px 40px 20px;
        }

        .profile-container {
            background: var(--white);
            width: 100%;
            max-width: 400px;
            padding: 30px 24px;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
            text-align: center;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        .avatar-main {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
            box-shadow: 0 8px 20px rgba(51, 144, 236, 0.2);
        }

        .profile-name {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-username {
            font-size: 14px;
            color: var(--text2);
            margin-bottom: 24px;
        }

        .profile-btn {
            display: block;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 12px;
            text-decoration: none;
            text-align: center;
            font-family: inherit;
        }

        .btn-theme-blue {
            background: var(--primary);
            color: white !important;
        }

        .btn-theme-red {
            background: rgba(255, 107, 107, 0.1);
            color: var(--danger) !important;
            border: 1px solid rgba(255, 107, 107, 0.2);
            margin-top: 12px;
            margin-bottom: 0;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(26, 26, 46, 0.4);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 380px;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.15);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            background: #f8fafc;
            margin-bottom: 16px;
        }

        .rules { margin: 12px 0; }

        .hint {
            display: flex;
            align-items: center;
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 7px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 8px;
            background: #dde4ec;
            border: 1.5px solid #c8d4e0;
        }

        .hint.success { color: var(--success); }
        .hint.success .status-dot { background: var(--success); border-color: var(--success); }

        .hint.invalid { color: var(--danger); }
        .hint.invalid .status-dot { background: var(--danger); border-color: var(--danger); }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .btn-cancel {
            background: #e2e8f0;
            color: #475569 !important;
        }

        /* 🔥 FIX №2: bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: var(--white);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 999;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .nav-item {
            text-decoration: none;
            color: var(--text2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 12px;
            font-weight: 500;
            flex: 1;
        }

        .nav-item.active {
            color: var(--primary);
        }

        /* 🔥 FIX №3: десктоп */
        @media (min-width: 768px) {
            .bottom-nav {
                display: none;
            }

            body {
                padding-bottom: 40px;
            }
        }

    </style>
</head>

<body>

    <!-- ТВОЙ ОРИГИНАЛЬНЫЙ HTML БЕЗ ИЗМЕНЕНИЙ -->
    <div class="profile-container">
        <div class="avatar-main">
            {% if user and user.name %}
                {{ user.name[0]|upper }}
            {% else %}
                K
            {% endif %}
        </div>

        <div class="profile-name">{{ user.name if user else 'kkk' }}</div>
        <div class="profile-username">@{{ user.login if user else 'Oyatullo' }}</div>

        <button class="profile-btn btn-theme-blue" onclick="openModal('nameModal')">Изменить имя</button>
        <button class="profile-btn btn-theme-blue" onclick="openModal('loginModal')">Изменить логин</button>
        <button class="profile-btn btn-theme-blue" onclick="openModal('passwordModal')">Сменить пароль</button>

        <a href="/logout" class="profile-btn btn-theme-red">Выйти</a>
    </div>

    <!-- NAV -->
    <div class="bottom-nav">
        <a href="/" class="nav-item">💬<div>Чаты</div></a>
        <a href="/search" class="nav-item">🔍<div>Поиск</div></a>
        <a href="/profile" class="nav-item active">👤<div>Профиль</div></a>
    </div>

    <!-- ТВОИ JS ОСТАВЛЕН -->
    <script>
        function openModal(id) {
            document.getElementById(id).classList.add('active');
        }
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }
        function closeModalOnOutsideClick(e, id) {
            if (e.target.id === id) closeModal(id);
        }

        const pName = document.getElementById('p_name');
        const nameBtn = document.getElementById('nameBtn');

        if (pName) {
            pName.addEventListener('input', function() {
                nameBtn.disabled = this.value.trim().length < 2;
            });
        }
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>KadrGram | Профиль</title>

    <style>

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: sans-serif;
            background: #f0f2f5;
            padding-bottom: 90px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background: #3390ec;
            color: white;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 40px;
            font-weight: bold;

            margin: auto;
            margin-bottom: 20px;
        }

        .name {
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .login {
            text-align: center;
            color: gray;
            margin-top: 5px;
            margin-bottom: 25px;
        }

        .btn {
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 12px;

            background: #3390ec;
            color: white;

            font-size: 15px;
            font-weight: bold;

            cursor: pointer;
        }

        .logout {
            background: #ff4d4d;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;

            height: 70px;

            background: white;
            border-top: 1px solid #eee;

            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .nav-item {
            text-decoration: none;
            color: #777;

            display: flex;
            flex-direction: column;
            align-items: center;

            font-size: 12px;
        }

        .nav-item.active {
            color: #3390ec;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="avatar">
            {{ user.name[0] }}
        </div>

        <div class="name">
            {{ user.name }}
        </div>

        <div class="login">
            @{{ user.login }}
        </div>

<form action="/change_name" method="POST">

    <input
        type="text"
        name="name"
        placeholder="Новое имя"
        required
        class="input"
    >

<button class="btn" onclick="openModal('nameModal')">
    Изменить имя
</button>

<button class="btn" onclick="openModal('loginModal')">
    Изменить логин
</button>

<button class="btn" onclick="openModal('passwordModal')">
    Сменить пароль
</button>

</form>

        <a href="/logout">
            <button class="btn logout">
                Выйти
            </button>
        </a>

    </div>

</div>

<!-- NAME MODAL -->
<div class="modal" id="nameModal">

    <div class="modal-content">

        <h3>Новое имя</h3>

        <form action="/change_name" method="POST">

            <input
                type="text"
                name="name"
                placeholder="Введите имя"
                required
                class="input"
            >

            <button class="btn">
                Сохранить
            </button>

        </form>

        <button class="close-btn" onclick="closeModal('nameModal')">
            Отмена
        </button>

    </div>

</div>


<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">

    <div class="modal-content">

        <h3>Новый логин</h3>

        <form action="/change_login" method="POST">

            <input
                type="text"
                name="login"
                placeholder="Введите логин"
                required
                class="input"
            >

            <button class="btn">
                Сохранить
            </button>

        </form>

        <button class="close-btn" onclick="closeModal('loginModal')">
            Отмена
        </button>

    </div>

</div>


<!-- PASSWORD MODAL -->
<div class="modal" id="passwordModal">

    <div class="modal-content">

        <h3>Новый пароль</h3>

        <form onsubmit="return validatePasswords()" action="/change_password" method="POST">

            <input
                type="password"
                name="password"
                id="pass1"
                placeholder="Новый пароль"
                required
                class="input"
                minlength="8"
            >

            <input
                type="password"
                id="pass2"
                placeholder="Повторите пароль"
                required
                class="input"
                minlength="8"
            >

            <div id="passError" class="error"></div>

            <button class="btn">
                Сохранить
            </button>

        </form>

        <button class="close-btn" onclick="closeModal('passwordModal')">
            Отмена
        </button>

    </div>

</div>

<div class="bottom-nav">

    <a href="/" class="nav-item">
        <div>💬</div>
        <span>Чаты</span>
    </a>

    <a href="/search" class="nav-item">
        <div>🔍</div>
        <span>Поиск</span>
    </a>

    <a href="/profile" class="nav-item active">
        <div>👤</div>
        <span>Профиль</span>
    </a>

</div>

</body>
</html>
